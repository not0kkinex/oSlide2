<!-- SIDEBAR -->
<aside id="sidebar" aria-label="Sidebar Navigation">

  <div class="sidebar-logo">
    <div class="logo-box">O</div>
    <span class="logo-text">oSlide2</span>
  </div>

  <!-- MAIN NAV -->
  <nav class="sidebar-nav" aria-label="Main Navigation">

    <a
      class="nav-item active"
      data-section="home"
      aria-current="page"
    >
      <i data-lucide="layout-dashboard"></i>
      <span data-i18n="home.projects">
        Ana Ekran
      </span>
    </a>

    <a
      class="nav-item"
      data-section="recent"
    >
      <i data-lucide="clock"></i>
      <span data-i18n="home.recent">
        Son Projeler
      </span>
    </a>

    <a
      class="nav-item"
      data-section="favorites"
    >
      <i data-lucide="star"></i>
      <span data-i18n="home.favorites">
        Favoriler
      </span>
    </a>

  </nav>

  <div class="sidebar-divider"></div>

  <!-- TEMPLATE SECTION -->
  <div class="sidebar-section-label">
    ŞABLONLAR
  </div>

  <nav class="sidebar-nav">

    <a
      class="nav-item"
      data-section="templates"
    >
      <i data-lucide="layout-template"></i>

      <span>
        Şablon Galerisi
      </span>
    </a>

  </nav>

  <div class="sidebar-divider"></div>

  <!-- THEMES -->
  <div
    class="sidebar-section-label"
    data-i18n="home.themes"
  >
    TEMALAR
  </div>

  <nav class="sidebar-nav">

    <a
      class="nav-item"
      data-section="themes"
    >
      <i data-lucide="palette"></i>

      <span data-i18n="home.themeGallery">
        Tema Galerisi
      </span>
    </a>

    <a
      class="nav-item"
      data-section="new-theme"
      id="sidebar-new-theme"
    >
      <i data-lucide="plus-circle"></i>

      <span data-i18n="home.newTheme">
        Yeni Tema
      </span>
    </a>

  </nav>

  <div class="sidebar-spacer"></div>

  <!-- SETTINGS -->
  <nav class="sidebar-nav">

    <a
      class="nav-item"
      id="sidebar-settings"
    >
      <i data-lucide="settings"></i>

      <span data-i18n="home.settings">
        Ayarlar
      </span>
    </a>

  </nav>

</aside>

<!-- MAIN -->
<main id="main-area">

  <!-- TOPBAR -->
  <header id="topbar">

    <!-- SEARCH -->
    <div
      class="search-box"
      role="search"
    >

      <i
        data-lucide="search"
        class="search-icon"
      ></i>

      <input
        type="search"
        id="search-input"
        autocomplete="off"
        spellcheck="false"
        data-i18n-attr="placeholder:home.searchPlaceholder"
      />

    </div>

    <!-- ACTIONS -->
    <div class="topbar-actions">

      <button
        id="new-project-btn"
        class="btn-primary"
        type="button"
      >
        <i data-lucide="plus"></i>

        <span data-i18n="home.newProject">
          Yeni Proje
        </span>
      </button>

      <button
        id="open-file-btn"
        class="btn-secondary"
        type="button"
      >
        <i data-lucide="folder-open"></i>

        <span data-i18n="home.openFile">
          Dosyadan Aç
        </span>
      </button>

    </div>

  </header>

  <!-- CONTENT -->
  <section id="content">

    <!-- EMPTY STATE -->
    <section
      id="welcome"
      class="hidden"
    >

      <div class="welcome-icon">
        <i data-lucide="presentation"></i>
      </div>

      <h1 data-i18n="home.title">
        Henüz proje yok
      </h1>

      <p data-i18n="home.subtitle">
        İlk sununuzu oluşturun.
      </p>

      <div class="welcome-actions">

        <button
          id="welcome-new-btn"
          class="btn-primary"
          type="button"
        >
          <i data-lucide="plus"></i>

          <span data-i18n="home.newProject">
            Yeni Proje
          </span>
        </button>

        <button
          id="welcome-open-btn"
          class="btn-secondary"
          type="button"
        >
          <i data-lucide="folder-open"></i>

          <span data-i18n="home.openFile">
            Dosyadan Aç
          </span>
        </button>

      </div>

    </section>

    <!-- PROJECTS -->
    <section
      id="projects-section"
      class="hidden"
    >
      <div id="projects-grid"></div>
      <div id="project-list"></div>
    </section>

    <!-- THEMES -->
    <section
      id="themes-section"
      class="hidden"
    >
      <div id="themes-grid"></div>
    </section>

    <!-- TEMPLATE GALLERY -->
    <section
      id="section-templates"
      class="home-section hidden"
    >

      <div class="section-head">

        <h2>
          Şablon Galerisi
        </h2>

        <p class="section-desc">
          Bir şablon seç, proje olarak açılır —
          istediğin gibi düzenle.
        </p>

      </div>

      <!-- FILTER -->
      <div class="template-filter">

        <button
          class="tf-btn active"
          data-cat="all"
          type="button"
        >
          Tümü
        </button>

        <button
          class="tf-btn"
          data-cat="temel"
          type="button"
        >
          Temel
        </button>

        <button
          class="tf-btn"
          data-cat="düzen"
          type="button"
        >
          Düzen
        </button>

        <button
          class="tf-btn"
          data-cat="içerik"
          type="button"
        >
          İçerik
        </button>

      </div>

      <!-- GALLERY -->
      <div
        id="template-gallery"
        class="template-gallery-grid"
      ></div>

    </section>

  </section>

</main>
